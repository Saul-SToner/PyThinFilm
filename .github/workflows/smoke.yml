name: smoke-test

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
      THINFILM_OUTPUT_DIR: ${{ github.workspace }}/thinfilm_outputs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m compileall thinfilm guided_grating cases smoke_test.py
      - run: python smoke_test.py
